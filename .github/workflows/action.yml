name: Run Python Cron Job

on:
  schedule:
    - cron: '0 * * * *'   # Every 1 hours
  workflow_dispatch:      # Allows manual run from GitHub UI


jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          python3 -m pip install -r server/services/googleTrends/Requirements.txt

      - name: Run script
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cd server
          python3 -m services.googleTrends.google_trends
      
     
      - name: Commit status.log
        run: |
          git config user.name "AlexBrown13"
          git config user.email "chen.brown@ruppin365.net"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "updated logs" --allow-empty)
          
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
